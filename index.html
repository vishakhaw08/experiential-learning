<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetSpeed Pro</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    ⚡ NetSpeed Pro
    <p>Test Your Internet Speed Instantly</p>
  </header>

  <div class="container">

    <h2>🚀 Speed Test</h2>

    <!-- Button -->
    <button onclick="startTest()">Start Test</button>

    <!-- Cards -->
    <div class="cards">

      <div class="card">
        <h3>Ping</h3>
        <div class="value" id="ping">-- ms</div>
      </div>

      <div class="card">
        <h3>Download</h3>
        <div class="value" id="download">-- Mbps</div>
      </div>

      <div class="card">
        <h3>Upload</h3>
        <div class="value" id="upload">-- Mbps</div>
      </div>

    </div>

  </div>

  <footer>
    © 2026 NetSpeed Pro
  </footer>

  <!-- External JavaScript -->
  <script src="script.js"></script>

</body>
</html>
